services:
  - type: web
    name: vailae
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: BOT_USERNAME
        value: vailae_bot
      - key: BOT_TOKEN
        sync: false
      - key: MAX_DEVICES
        value: 2
      - key: DATABASE_URL
        fromDatabase:
          name: vailae-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: vailae-db
    plan: free
    databaseName: vailae
    user: vailae_user
    ipAllowList: []
